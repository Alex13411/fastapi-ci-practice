name: FastAPI Quality Gates

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  run-checks:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # Здесь устанавливаются линтеры и библиотеки для работы FastAPI
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 isort black mypy pytest pytest-asyncio httpx fastapi sqlalchemy aiosqlite

    - name: Run isort
      run: python -m isort --check-only --settings-path pyproject.toml .

    - name: Run Black
      run: python -m black --check .

    - name: Run Flake8
      run: python -m flake8 .

    - name: Run Mypy
      run: python -m mypy .

    - name: Run Tests
      run: python -m pytest